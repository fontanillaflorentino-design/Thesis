<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Transaction Data</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Georgia", serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(115deg,
        #d53a20 0%,
        #8a2b12 20%,
        #1e2b0c 45%,
        #0b3b12 65%,
        #63b52e 100%);
      padding:40px 20px;
      color:white;
    }

    .container{
      max-width:1200px;
      margin:auto;
    }

    .header{
      text-align:center;
      margin-bottom:30px;
    }

    .header h1{
      font-size:38px;
      text-shadow:2px 2px 3px rgba(0,0,0,0.5);
    }

    .header p{
      margin-top:8px;
      font-size:18px;
    }

    .card{
      background: rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.25);
      border-radius:20px;
      padding:25px;
      backdrop-filter: blur(6px);
      box-shadow:0 8px 20px rgba(0,0,0,0.25);
      margin-bottom:30px;
    }

    .card h2{
      margin-bottom:20px;
      font-size:28px;
    }

    .form-grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap:18px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    .form-group label{
      margin-bottom:8px;
      font-size:16px;
      font-weight:bold;
    }

    .form-group input,
    .form-group select{
      padding:12px 15px;
      border:none;
      border-radius:12px;
      outline:none;
      font-size:15px;
    }

    .btn-group{
      margin-top:20px;
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    button{
      padding:12px 24px;
      border:none;
      border-radius:30px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s ease;
    }

    .save-btn{
      background:white;
      color:#1b1b1b;
    }

    .save-btn:hover{
      background:#ececec;
    }

    .clear-btn{
      background:#222;
      color:white;
    }

    .clear-btn:hover{
      background:#111;
    }

    .table-wrapper{
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      color:#111;
      border-radius:16px;
      overflow:hidden;
    }

    table th,
    table td{
      padding:14px 12px;
      text-align:center;
      border-bottom:1px solid #ddd;
    }

    table th{
      background:#184d16;
      color:white;
    }

    table tr:hover{
      background:#f5f5f5;
    }

    .action-btn{
      padding:7px 14px;
      border-radius:20px;
      font-size:14px;
      margin:2px;
    }

    .edit-btn{
      background:#2f8f2f;
      color:white;
    }

    .delete-btn{
      background:#d62828;
      color:white;
    }

    .section-title{
      font-size:30px;
      margin:35px 0 20px;
      text-align:center;
      text-shadow:2px 2px 3px rgba(0,0,0,0.5);
    }

    @media (max-width: 768px){
      .header h1{
        font-size:28px;
      }

      .card h2{
        font-size:22px;
      }

      .section-title{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>NDF Electrical Supply</h1>
      <p>Sales Transaction Management</p>
    </div>

    <h2 class="section-title">Sales Transaction Data</h2>

    <div class="card">
      <h2>Sales Entry Form</h2>
      <form id="salesForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Transaction ID</label>
            <input type="text" id="transaction" placeholder="Enter transaction ID">
          </div>

          <div class="form-group">
            <label>Date</label>
            <input type="date" id="date">
          </div>

          <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="customer" placeholder="Enter customer name">
          </div>

          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="product" placeholder="Enter product name">
          </div>

          <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="quantity" placeholder="Enter quantity">
          </div>

          <div class="form-group">
            <label>Unit Price</label>
            <input type="number" id="price" placeholder="Enter unit price">
          </div>

          <div class="form-group">
            <label>Total Amount</label>
            <input type="number" id="amount" placeholder="Enter total amount" readonly>
          </div>

          <div class="form-group">
            <label>Payment Status</label>
            <select id="payment">
              <option>Paid</option>
              <option>Pending</option>
              <option>Partial</option>
            </select>
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="save-btn">Save Transaction</button>
          <button type="reset" class="clear-btn">Clear</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Sales Transaction Records</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Transaction ID</th>
              <th>Date</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price</th>
              <th>Total</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="salesrecord"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("quantity").addEventListener("input", computeTotal);
    document.getElementById("price").addEventListener("input", computeTotal);

    function computeTotal(){
      const q = document.getElementById("quantity").value;
      const p = document.getElementById("price").value;
      document.getElementById("amount").value = q * p;
    }

    document.getElementById("salesForm").addEventListener("submit", function(e){
      e.preventDefault();

      const id = document.getElementById("transaction").value;
      const date = document.getElementById("date").value;
      const customer = document.getElementById("customer").value;
      const product = document.getElementById("product").value;
      const quantity = document.getElementById("quantity").value;
      const price = document.getElementById("price").value;
      const amount = document.getElementById("amount").value;
      const payment = document.getElementById("payment").value;

      const table = document.getElementById("salesrecord");
      const row = table.insertRow();

      row.innerHTML = `
        <td>${id}</td>
        <td>${date}</td>
        <td>${customer}</td>
        <td>${product}</td>
        <td>${quantity}</td>
        <td>${price}</td>
        <td>${amount}</td>
        <td>${payment}</td>
        <td>
          <button class="action-btn edit-btn" type="button">Edit</button>
          <button class="action-btn delete-btn" type="button">Delete</button>
        </td>
      `;

      document.getElementById("salesForm").reset();
    });
  </script>
</body>
</html>
