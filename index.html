<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDF Electrical Supply Login</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo">
        <!-- Replace this with your real logo -->
        <img src="NDF.png" alt="NDF Logo">
      </div>

      <h1 class="title">NDF Electrical Supply</h1>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username or Employee ID</label>
          <div class="input-wrapper">
            <span class="icon">👤</span>
            <input type="text" id="username" name="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <span class="left-icon">🔒</span>
            <input type="password" id="password" name="password" />
            <button type="button" class="toggle" onclick="togglePassword()">👁</button>
          </div>
          <a href="#" class="forgot">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">LOG IN</button>
      </form>
    </div>
  </div>

  
   <script>
  function togglePassword() {
    const password = document.getElementById("password");
    if (password.type === "password") {
      password.type = "text";
    } else {
      password.type = "password";
    }
  }

  const users = [
    { username: "clark@gmail.com", password: "12345" },
    { username: "florentino@gmail.com", password: "abc123" },
    { username: "villespin@gmail.com", password: "abc123" },
    { username: "ong@gmail.com", password: "abc123" },
    { username: "mengala@gmail.com", password: "abc123" }
  ];

  document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();

    const validUser = users.find(function(user) {
      return user.username === username && user.password === password;
    });

    if (validUser) {
      alert("Login successful!");
      window.location.href = "menu.html";
    } else {
      alert("Invalid username or password.");
    }
  });
</script>
  



</body>
</html>
