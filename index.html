<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NDF Electrical Supply Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        linear-gradient(115deg,
          #d90000 0%,
          #822200 20%,
          #1e2a00 42%,
          #003b00 62%,
          #70b833 100%);
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .login-box {
      width: 360px;
      text-align: center;
      color: white;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      margin: 0 auto 14px;
      overflow: hidden;
      border: 2px solid #000;
      background: #fff;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 1px 1px 0 #000;
    }

    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 1px 1px 0 #000;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #f2f2f2;
      border-radius: 999px;
      height: 36px;
      overflow: hidden;
      border: 1px solid #999;
    }

    .input-wrapper .icon {
      width: 42px;
      text-align: center;
      color: #111;
      font-size: 16px;
    }

    .input-wrapper input {
      flex: 1;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      padding-right: 10px;
    }

    .password-wrapper {
      display: flex;
      align-items: center;
      background: #f2f2f2;
      border-radius: 999px;
      height: 36px;
      overflow: hidden;
      border: 1px solid #999;
    }

    .password-wrapper .left-icon {
      width: 42px;
      text-align: center;
      color: #111;
      font-size: 16px;
    }

    .password-wrapper input {
      flex: 1;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      padding-right: 10px;
    }

    .password-wrapper .toggle {
      width: 44px;
      height: 100%;
      border-left: 1px solid #999;
      background: transparent;
      border-top: none;
      border-right: none;
      border-bottom: none;
      cursor: pointer;
      font-size: 16px;
    }

    .forgot {
      display: block;
      text-align: right;
      margin-top: 4px;
      font-size: 12px;
      font-weight: 700;
      color: white;
      text-decoration: none;
      text-shadow: 1px 1px 0 #000;
    }

    .forgot:hover {
      text-decoration: underline;
    }

    .login-btn {
      margin-top: 22px;
      width: 126px;
      height: 34px;
      border: 1px solid #888;
      border-radius: 999px;
      background: #f4f4f4;
      color: #111;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }

    .login-btn:hover {
      background: #e8e8e8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box">
      <div class="logo">
        <!-- Replace this with your real logo -->
        <img src="NDF.png" alt="NDF Logo">
      </div>

      <h1 class="title">NDF Electrical Supply</h1>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username or Employee ID</label>
          <div class="input-wrapper">
            <span class="icon">👤</span>
            <input type="text" id="username" name="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <span class="left-icon">🔒</span>
            <input type="password" id="password" name="password" />
            <button type="button" class="toggle" onclick="togglePassword()">👁</button>
          </div>
          <a href="#" class="forgot">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn">LOG IN</button>
      </form>
    </div>
  </div>

  
   <script>
  function togglePassword() {
    const password = document.getElementById("password");
    if (password.type === "password") {
      password.type = "text";
    } else {
      password.type = "password";
    }
  }

  const users = [
    { username: "clark@gmail.com", password: "12345" },
    { username: "florentino@gmail.com", password: "abc123" },
    { username: "villespin@gmail.com", password: "abc123" },
    { username: "ong@gmail.com", password: "abc123" },
    { username: "mengala@gmail.com", password: "abc123" }
  ];

  document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const username = document.getElementById("username").value.trim().toLowerCase();
    const password = document.getElementById("password").value.trim();

    const validUser = users.find(function(user) {
      return user.username === username && user.password === password;
    });

    if (validUser) {
      alert("Login successful!");
      window.location.href = "menu.html";
    } else {
      alert("Invalid username or password.");
    }
  });
</script>
  



</body>
</html>
